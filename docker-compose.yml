version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: 2bi-db
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-2bi_database}
      - POSTGRES_USER=${DB_USER:-2bi_user}
      - POSTGRES_PASSWORD=${DB_PASS:-2bi_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: 2bi-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
      - DB_HOST=db
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://2bi.orionchat.cloud/api
    container_name: 2bi-frontend
    restart: always
    networks:
      - app-network
    ports:
      - "3000:80"

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
